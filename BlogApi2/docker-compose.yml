version: '3.8'

services:
  blogdb:
    image: mongo
    container_name: blogdb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - net7-network

  blog.api:
    container_name: blog.api
    build:
      context: .
      dockerfile: BlogApi2/Dockerfile
    depends_on:
      - blogdb
    ports:
      - "8000:80"
    networks:
      - net7-network

volumes:
  mongo_data:

networks:
  net7-network:
    driver: bridge